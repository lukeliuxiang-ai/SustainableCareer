<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TOP 职业巅峰状态 · 睿观生涯</title>
    <meta name="description" content="组织需求 O、天赋技能 T、工作热情 P 三圆交叠——交互理解职业巅峰状态与四种情景变化。">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0a1f2e;
            --navy: #0f2d3d;
            --slate: #1a3c5c;
            --steel: #2c5a7a;
            --gold: #d4a853;
            --gold-light: #e8c878;
            --gold-dark: #b8923e;
            --cream: #faf8f3;
            --ivory: #f5f0e8;
            --text-dark: #1e2a35;
            --text-body: #3d4f5f;
            --text-light: #6b7d8d;
            --o-fill: rgba(245, 158, 11, 0.55);
            --o-border: #d97706;
            --t-fill: rgba(59, 130, 246, 0.5);
            --t-border: #2563eb;
            --p-fill: rgba(139, 92, 246, 0.48);
            --p-border: #7c3aed;
            --peak-glow: rgba(251, 113, 133, 0.35);
            --s4-dx: 95px;
            --s4-dy: -52px;
            --stage-w: 580px;
            --stage-h: 480px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100dvh;
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--cream);
            color: var(--text-body);
            line-height: 1.7;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        img { max-width: 100%; height: auto; }

        .top-bar {
            background: linear-gradient(135deg, var(--deep-blue) 0%, var(--slate) 100%);
            padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) 12px max(16px, env(safe-area-inset-left));
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 200;
            flex-shrink: 0;
        }
        .back-link {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--gold); }
        .top-link {
            color: var(--gold);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
        }
        .top-link:hover { color: var(--gold-light); }

        .deck-frame {
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 50;
        }
        .deck-colorpatch {
            position: absolute;
            top: max(48px, env(safe-area-inset-top));
            left: 0;
            width: auto;
            height: auto;
            max-height: min(22vh, 140px);
            max-width: min(48vw, 360px);
            object-fit: contain;
        }
        .deck-logo {
            position: absolute;
            top: max(52px, calc(8px + env(safe-area-inset-top)));
            right: max(12px, env(safe-area-inset-right));
            width: auto;
            height: auto;
            max-height: min(12vh, 88px);
            max-width: min(38vw, 160px);
            object-fit: contain;
        }

        .shell {
            position: relative;
            z-index: 60;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 0 12px max(88px, calc(72px + env(safe-area-inset-bottom)));
        }

        .page-title {
            text-align: center;
            padding: 16px 12px 8px;
            flex-shrink: 0;
        }
        .page-title h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(1.15rem, 3.5vw, 1.65rem);
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0.04em;
        }
        .page-title .sub {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 6px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .viz-area {
            flex: 1;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 4px;
            overflow: hidden;
        }

        .stage-scaler {
            width: var(--stage-w);
            height: var(--stage-h);
            flex-shrink: 0;
            transform-origin: center center;
            will-change: transform;
        }

        .stage {
            position: relative;
            width: var(--stage-w);
            height: var(--stage-h);
            border-radius: 20px;
            background: linear-gradient(180deg, #f1f5f9 0%, #e8eef5 100%);
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 12px 40px rgba(10, 31, 46, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.9);
            overflow: visible;
        }
        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background-image:
                radial-gradient(circle at 22% 28%, rgba(251, 191, 36, 0.12) 0%, transparent 42%),
                radial-gradient(circle at 78% 70%, rgba(99, 102, 241, 0.1) 0%, transparent 45%);
            pointer-events: none;
        }

        .orb {
            position: absolute;
            width: 268px;
            height: 268px;
            margin-left: -134px;
            margin-top: -134px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 1.35s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.12);
        }
        .orb .glyph { font-size: 1.85rem; margin-bottom: 2px; filter: drop-shadow(0 1px 1px rgba(255, 255, 255, 0.6)); }
        .orb .letter { font-size: 1.55rem; font-weight: 800; letter-spacing: 0.05em; color: rgba(15, 23, 42, 0.88); }
        .orb .name-cn { font-size: 0.72rem; margin-top: 2px; color: rgba(15, 23, 42, 0.82); }
        .orb .name-en { font-size: 0.6rem; color: rgba(15, 23, 42, 0.62); margin-top: 2px; }
        .orb-o {
            left: 50%;
            top: 168px;
            background: radial-gradient(circle at 42% 38%, var(--o-fill) 0%, rgba(251, 191, 129, 0.45) 72%);
            border: 2.5px solid var(--o-border);
            z-index: 3;
        }
        .orb-t {
            left: 36%;
            top: 348px;
            background: radial-gradient(circle at 35% 38%, var(--t-fill) 0%, rgba(147, 197, 253, 0.42) 75%);
            border: 2.5px solid var(--t-border);
            z-index: 2;
        }
        .orb-p {
            left: 64%;
            top: 348px;
            background: radial-gradient(circle at 62% 38%, var(--p-fill) 0%, rgba(196, 181, 253, 0.42) 75%);
            border: 2.5px solid var(--p-border);
            z-index: 2;
        }
        .peak-core {
            position: absolute;
            left: 50%;
            top: 292px;
            transform: translate(-50%, -50%);
            width: 132px;
            height: 132px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            background: radial-gradient(circle, rgba(254, 243, 199, 0.95) 0%, rgba(254, 202, 202, 0.55) 52%, rgba(255, 255, 255, 0.2) 74%);
            box-shadow: 0 0 36px var(--peak-glow), inset 0 0 20px rgba(255, 255, 255, 0.85);
            transition: transform 1.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.35s ease, box-shadow 1.35s ease;
        }
        .peak-core .arrows { font-size: 0.7rem; letter-spacing: 0.12em; color: #b45309; margin-bottom: 2px; }
        .peak-core .top-mark { font-size: 1.25rem; font-weight: 900; letter-spacing: 0.18em; color: #0f172a; }
        .peak-core .peak-cn { font-size: 0.68rem; font-weight: 700; color: #78350f; line-height: 1.35; margin-top: 5px; max-width: 102px; }
        .peak-core .peak-en { font-size: 0.55rem; color: #64748b; margin-top: 3px; }

        .stage.scenario-1 .peak-core,
        .stage.scenario-2 .peak-core,
        .stage.scenario-3 .peak-core,
        .stage.scenario-4 .peak-core {
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0.65;
            box-shadow: 0 0 12px rgba(251, 113, 133, 0.2);
        }
        .stage.scenario-1 .orb-t { transform: translate(-132px, 36px); }
        .stage.scenario-2 .orb-p { transform: translate(132px, 36px); }
        .stage.scenario-3 .orb-o { transform: translate(72px, -56px); }
        .stage.scenario-4 .orb-o { transform: translate(var(--s4-dx), var(--s4-dy)); }
        .stage.scenario-4-follow .orb-o,
        .stage.scenario-4-follow .orb-t,
        .stage.scenario-4-follow .orb-p { transform: translate(var(--s4-dx), var(--s4-dy)); }
        .stage.scenario-4-follow .peak-core {
            transform: translate(calc(-50% + var(--s4-dx)), calc(-50% + var(--s4-dy))) scale(1.08);
            opacity: 1;
            box-shadow: 0 0 40px rgba(52, 211, 153, 0.35), 0 0 20px var(--peak-glow), inset 0 0 24px rgba(255, 255, 255, 0.9);
        }

        .controls {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
            padding-bottom: 8px;
        }
        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
        }
        .btn-scene {
            position: relative;
            width: 52px;
            height: 52px;
            padding: 0;
            border-radius: 50%;
            border: 2px solid rgba(10, 31, 46, 0.12);
            cursor: pointer;
            flex: 0 0 auto;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 6px 18px rgba(10, 31, 46, 0.12);
        }
        .btn-scene .btn-num {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
            pointer-events: none;
        }
        .btn-scene:hover { filter: brightness(1.06); box-shadow: 0 8px 22px rgba(10, 31, 46, 0.16); }
        .btn-scene:active { transform: scale(0.94); }
        .btn-scene:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
        .btn-scene.is-active {
            box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.45), 0 8px 22px rgba(10, 31, 46, 0.18);
        }
        .btn-s1 { background: linear-gradient(145deg, var(--steel), var(--slate)); }
        .btn-s2 { background: linear-gradient(145deg, #a78bfa, #7c3aed); }
        .btn-s3 { background: linear-gradient(145deg, var(--gold-light), var(--gold-dark)); }
        .btn-s4 { background: linear-gradient(145deg, #34d399, #059669); }
        .btn-reset {
            font-family: inherit;
            align-self: center;
            padding: 10px 28px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fff;
            color: var(--text-body);
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .btn-reset:hover {
            background: var(--ivory);
            border-color: rgba(212, 168, 83, 0.35);
        }
        .caption {
            min-height: 5.5em;
            padding: 14px 16px;
            border-radius: 14px;
            background: #fff;
            border: 1px solid rgba(0,0,0,0.06);
            font-size: 14px;
            line-height: 1.75;
            color: var(--text-body);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .caption strong { color: var(--gold-dark); font-weight: 600; }
        .caption--idle {
            color: var(--text-light);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, var(--ivory) 0%, #fff 100%);
            border-left: 3px solid var(--gold);
        }
        .caption--blank { color: transparent; }
        .caption--visible { text-align: left; }

        .deck-nav {
            position: fixed;
            bottom: max(12px, env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 max(12px, env(safe-area-inset-left)) 0 max(12px, env(safe-area-inset-right));
            z-index: 300;
            pointer-events: none;
        }
        .deck-nav a {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--deep-blue) 0%, var(--slate) 100%);
            color: rgba(255,255,255,0.92);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(212, 168, 83, 0.25);
            box-shadow: 0 4px 16px rgba(10, 31, 46, 0.2);
            transition: transform 0.15s ease, border-color 0.2s ease;
        }
        .deck-nav a:hover {
            border-color: var(--gold);
            transform: translateY(-1px);
        }

        @media (max-width: 480px) {
            :root { --s4-dx: 72px; --s4-dy: -42px; }
            .stage { height: 430px; --stage-h: 430px; }
            .stage-scaler, .stage { width: 580px; }
            .orb { width: 230px; height: 230px; margin-left: -115px; margin-top: -115px; }
            .orb-o { top: 152px; }
            .orb-t { left: 34%; top: 310px; }
            .orb-p { left: 66%; top: 310px; }
            .peak-core { top: 258px; width: 112px; height: 112px; }
            .stage.scenario-1 .orb-t { transform: translate(-108px, 30px); }
            .stage.scenario-2 .orb-p { transform: translate(108px, 30px); }
            .stage.scenario-3 .orb-o { transform: translate(58px, -48px); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="toolbox.html" class="back-link"><i class="fas fa-arrow-left"></i> 资源工具箱</a>
        <a href="index.html" class="top-link">睿观首页</a>
    </div>

    <div class="deck-frame" aria-hidden="true">
        <img class="deck-colorpatch" src="images/colorpatch.png" alt="">
        <img class="deck-logo" src="images/lh_logo.png" alt="Logo">
    </div>

    <div class="shell">
        <div class="page-title">
            <h1>职业巅峰状态的 <span style="color:var(--gold-dark);">TOP</span> 模型</h1>
            <p class="sub">请先观察三圆交叠；再点按下方 <strong>1 → 4</strong> 情景按钮。<strong>1–3</strong> 点一次即移动并显示解读；<strong>4</strong> 点一次会分两步自动对齐（先随 O 移动，再 T/P 跟上），随后显示解读。</p>
        </div>

        <div class="viz-area">
            <div class="stage-scaler" id="stageScaler">
                <div class="stage" id="stage" aria-live="polite">
                    <div class="orb orb-o" id="orbO">
                        <span class="glyph" aria-hidden="true">⚙</span>
                        <span class="letter">O</span>
                        <span class="name-cn">组织需求</span>
                        <span class="name-en">Organizational Needs</span>
                    </div>
                    <div class="orb orb-t" id="orbT">
                        <span class="glyph" aria-hidden="true">✦</span>
                        <span class="letter">T</span>
                        <span class="name-cn">天赋技能</span>
                        <span class="name-en">Talent</span>
                    </div>
                    <div class="orb orb-p" id="orbP">
                        <span class="glyph" aria-hidden="true">♥</span>
                        <span class="letter">P</span>
                        <span class="name-cn">工作热情</span>
                        <span class="name-en">Passion</span>
                    </div>
                    <div class="peak-core" id="peakCore">
                        <span class="arrows">▲ ▲ ▲</span>
                        <span class="top-mark">TOP</span>
                        <span class="peak-cn">职业巅峰状态</span>
                        <span class="peak-en">Peak State</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="btn-row">
                <button type="button" class="btn-scene btn-s1" data-scenario="1" title="情景一" aria-label="情景一"><span class="btn-num">1</span></button>
                <button type="button" class="btn-scene btn-s2" data-scenario="2" title="情景二" aria-label="情景二"><span class="btn-num">2</span></button>
                <button type="button" class="btn-scene btn-s3" data-scenario="3" title="情景三" aria-label="情景三"><span class="btn-num">3</span></button>
                <button type="button" class="btn-scene btn-s4" data-scenario="4" title="情景四" aria-label="情景四"><span class="btn-num">4</span></button>
            </div>
            <button type="button" class="btn-reset" id="btnReset">重置</button>
            <div class="caption caption--idle" id="caption">O 组织需求在上 · T 天赋技能左下 · P 工作热情右下 — 三色交叠处即巅峰状态</div>
        </div>
    </div>

    <nav class="deck-nav" aria-label="页面导航">
        <a href="toolbox.html" class="nav-prev"><i class="fas fa-arrow-left"></i> 工具箱</a>
        <a href="contribution.html" class="nav-next">四个贡献模式 <i class="fas fa-arrow-right"></i></a>
    </nav>

    <script>
        (function () {
            const stage = document.getElementById("stage");
            const scaler = document.getElementById("stageScaler");
            const caption = document.getElementById("caption");
            const btnReset = document.getElementById("btnReset");
            const sceneButtons = document.querySelectorAll(".btn-scene");

            const texts = {
                "1": "<strong>场景一</strong>：O 与 P 未动，二者交叠区域不变；<strong>T（天赋技能）沿左下方向远离</strong>。三圆交集缩小，表示个体仍希望长期留在企业、组织仍有需要与热情维度，但<strong>能力跟不上需求变化</strong>，难以维持原有的巅峰贡献区。",
                "2": "<strong>场景二</strong>：T 与 O 未动，二者交叠区域不变；<strong>P（工作热情）沿右下方向远离</strong>。三圆交集缩小，表示组织仍需要个体的专业能力，但<strong>投入度与热情下降</strong>，巅峰状态难以维系。",
                "3": "<strong>场景三</strong>：T 与 P 未动，二者交叠区域不变；<strong>O（组织需求）开始远离</strong>。三圆交集缩小，表示能力与热情仍在，但<strong>与企业的战略与需求渐行渐远</strong>，共同价值区收缩。",
                "4": "<strong>场景四</strong>：先见 <strong>O（组织需求）平移</strong>，随后 <strong>T 与 P 与 O 同步平移、跟上新位置</strong>，三圆相对关系恢复，<strong>三圆共同交叠面积再次扩大</strong>，中央巅峰区重新饱满。寓意个体通过持续学习与调适，<strong>跟上了企业的变革速度</strong>，使天赋、热情与组织需要重新对齐，<strong>保持（或重建）职业的巅峰状态</strong>。"
            };
            const idleHint = "O 组织需求在上 · T 天赋技能左下 · P 工作热情右下 — 三色交叠处即巅峰状态";

            var activeScenario = null;
            var s4Timer1 = null;
            var s4Timer2 = null;
            var TRANS_MS = 1380;

            function clearS4Timers() {
                if (s4Timer1) {
                    clearTimeout(s4Timer1);
                    s4Timer1 = null;
                }
                if (s4Timer2) {
                    clearTimeout(s4Timer2);
                    s4Timer2 = null;
                }
            }

            function setStageScale() {
                const pad = 20;
                const reserved = 280;
                const sw = 580;
                const sh = stage.offsetHeight || 480;
                const vw = window.innerWidth - pad * 2;
                const vh = window.innerHeight - reserved;
                const s = Math.min(1, vw / sw, vh / sh, (window.innerWidth - 8) / sw);
                const scale = Math.max(0.32, s);
                scaler.style.transform = "scale(" + scale + ")";
            }

            function setActiveButton(key) {
                sceneButtons.forEach(function (b) {
                    b.classList.toggle("is-active", b.getAttribute("data-scenario") === key);
                });
            }

            function clearStageScenarios() {
                stage.classList.remove("scenario-1", "scenario-2", "scenario-3", "scenario-4", "scenario-4-follow");
            }

            function applyStageClass(key, phase4) {
                clearStageScenarios();
                if (key === "1") stage.classList.add("scenario-1");
                else if (key === "2") stage.classList.add("scenario-2");
                else if (key === "3") stage.classList.add("scenario-3");
                else if (key === "4") {
                    if (phase4 === 2) stage.classList.add("scenario-4-follow");
                    else stage.classList.add("scenario-4");
                }
            }

            function setCaptionIdle() {
                caption.className = "caption caption--idle";
                caption.textContent = idleHint;
            }

            function setCaptionHtml(html) {
                caption.className = "caption caption--visible";
                caption.innerHTML = html;
            }

            function resetAll() {
                clearS4Timers();
                activeScenario = null;
                clearStageScenarios();
                setActiveButton(null);
                setCaptionIdle();
                setStageScale();
            }

            function runScenario4Sequence() {
                clearS4Timers();
                activeScenario = "4";
                setActiveButton("4");
                applyStageClass("4", 1);
                caption.className = "caption caption--blank";
                caption.textContent = "";

                s4Timer1 = setTimeout(function () {
                    s4Timer1 = null;
                    applyStageClass("4", 2);
                    s4Timer2 = setTimeout(function () {
                        s4Timer2 = null;
                        setCaptionHtml(texts["4"]);
                    }, TRANS_MS);
                }, TRANS_MS);
            }

            function onSceneClick(key) {
                if (key === "4") {
                    runScenario4Sequence();
                    return;
                }
                clearS4Timers();
                activeScenario = key;
                applyStageClass(key, 0);
                setActiveButton(key);
                setCaptionHtml(texts[key]);
            }

            sceneButtons.forEach(function (btn) {
                btn.addEventListener("click", function () {
                    onSceneClick(this.getAttribute("data-scenario"));
                });
            });
            btnReset.addEventListener("click", resetAll);
            window.addEventListener("resize", setStageScale);
            window.addEventListener("orientationchange", function () { setTimeout(setStageScale, 200); });
            setStageScale();
        })();
    </script>
</body>
</html>
