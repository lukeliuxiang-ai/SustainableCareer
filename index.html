        }

        .lock-title {
            font-size: 1.8rem;

        }

        .lock-message {
            color: var(--text-gray);
            line-height: 1.8;
            margin-bottom: 30px;
        }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {

            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;

        }
        return null;

    // 检查是否已解锁

    // 格式化倒计时
    function getTimeRemaining() {
        const now = new Date();
        const diff = UNLOCK_TIME - now;
        if (diff <= 0) return null;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        return { days, hours, minutes, seconds, total: diff };
    }

                    </div>
                    <p style="margin-top:20px; color:var(--text-gray); font-size:0.9rem">
                        💬 课堂上我们会详细解读您的霍兰德代码含义，以及如何结合岗位发挥优势。
                    </p>
                </div>

                <div class="btn-group" style="text-align:center; margin-top:30px">
                    <button class="btn-outline" onclick="clearAndRestart()">重新测评</button>
                    <button class="btn-primary" onclick="window.print()">保存报告</button>
                </div>
            </div>
        `;
        
        // 绘制雷达图
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['R实际', 'I研究', 'A艺术', 'S社会', 'E企业', 'C常规'],
                datasets: [{
                    data: [percentages.R, percentages.I, percentages.A, percentages.S, percentages.E, percentages.C],
                    backgroundColor: 'rgba(0,85,164,0.2)',
                    borderColor: '#0055a4',
                    pointBackgroundColor: '#d4af37',
                    borderWidth: 2
                }]
            },
            options: { responsive: true, maintainAspectRatio: true, scales: { r: { beginAtZero: true, max: 100 } } }
        });
    }

    // 渲染首页（测评入口）
    function renderIntro() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="intro-section">
                <div class="logo">BV</div>
                <h1>必维职业发展规划测评</h1>
                <p class="subtitle">探索您的霍兰德职业兴趣代码</p>
                
                <div class="context-banner">
                    <h3>🎯 课前说明</h3>
                    <p>完成测评后，结果将在<span style="color:var(--accent-light)">${UNLOCK_TIME_STR}</span>自动解锁。届时我们会用15分钟讲解霍兰德代码的含义，然后一起解读大家的结果。</p>
                    <p style="margin-top:10px">💡 请如实作答，答案无对错之分。</p>
                </div>
                
                <div class="intro-card">
                    <div class="input-group">
                        <label>请选择您的从业年限</label>
                        <div class="experience-options">
                            <div class="experience-btn" data-exp="junior">
                                <span class="exp-title">10年以下</span>
                                <span class="exp-desc">重点提升专业能力</span>
                            </div>
                            <div class="experience-btn" data-exp="senior">
                                <span class="exp-title">10年及以上</span>
                                <span class="exp-desc">扩展行业影响力</span>
                            </div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>请输入您当前的岗位名称</label>
                        <input type="text" id="positionInput" placeholder="例如：质量工程师、项目经理...">
                    </div>
                </div>
                <button class="btn-primary" id="startQuizBtn" disabled>开始测评</button>
            </div>
        `;
        
        let selectedExp = null;
        document.querySelectorAll('.experience-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.experience-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedExp = btn.dataset.exp;
                checkStart();
            });
        });
        const positionInput = document.getElementById('positionInput');
        const startBtn = document.getElementById('startQuizBtn');
        function checkStart() {
            startBtn.disabled = !(selectedExp && positionInput.value.trim());
        }
        positionInput.addEventListener('input', checkStart);
        startBtn.addEventListener('click', () => {
            if (selectedExp && positionInput.value.trim()) {
                startQuiz(selectedExp, positionInput.value.trim());
            }
        });
    }

    // 开始测评（存储用户信息后进入答题）
    let currentQuestions = [];
    let currentIndex = 0;
    let quizScores = { R:0, I:0, A:0, S:0, E:0, C:0 };
    let quizUserExp = '';
    let quizUserPos = '';
    
    function startQuiz(exp, pos) {
        quizUserExp = exp;
        quizUserPos = pos;
        currentQuestions = shuffleArray([...questions]);
        currentIndex = 0;
        quizScores = { R:0, I:0, A:0, S:0, E:0, C:0 };
        renderQuizQuestion();
    }
    
    function renderQuizQuestion() {
        const app = document.getElementById('app');
        if (currentIndex >= currentQuestions.length) {
            // 完成测评，计算结果并存储
            const scores = quizScores;
            const sorted = Object.keys(scores).sort((a,b) => scores[b]-scores[a]);
            const resultData = {
                userPosition: quizUserPos,
                userExperience: quizUserExp,
                scores: scores,
                topCode: sorted[0],
                secondCode: sorted[1],
                thirdCode: sorted[2],
                completedAt: new Date().toISOString()
            };
            saveQuizData(resultData);
            // 重新根据当前时间判断显示锁屏还是结果
            initApp();
            return;
        }
        
        const q = currentQuestions[currentIndex];
        const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
        app.innerHTML = `
            <div class="quiz-section" style="display:block">
                <div class="progress-container">
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <div style="text-align:center; margin-top:10px">${currentIndex+1} / ${currentQuestions.length}</div>
                </div>
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="options-container" id="optionsContainer"></div>
                </div>
            </div>
        `;
        const optsContainer = document.getElementById('optionsContainer');
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `${opt.text}<span style="opacity:0.6">${opt.score}分</span>`;
            btn.onclick = () => {
                quizScores[q.code] += opt.score;
                currentIndex++;
                renderQuizQuestion();
            };
            optsContainer.appendChild(btn);
        });
    }
    
    function clearAndRestart() {
        clearQuizData();
        initApp();
    }
    
    // 主入口：判断状态并渲染相应界面
    function initApp() {
        const completedData = loadQuizData();
        if (!completedData) {
            renderIntro();
        } else {
            if (isUnlocked()) {
                renderResult(completedData);
            } else {
                renderLockScreen();
            }
        }
    }
    
    // 暴露全局函数
    window.clearAndRestart = clearAndRestart;
    
    initApp();
</script>
</body>
</html>
